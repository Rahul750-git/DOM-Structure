<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <caption id="table">Student Details</caption>
        <tr >
            <th >Name</th>
            <th>Age</th>
            <th>Class</th>
        </tr>
        <tr>
            <td>John Doe</td>
            <td>20</td>
            <td>10th Grade</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>19</td>
            <td>11th Grade</td>
        </tr>
        <tr>
            <td>Emily Johnson</td>
            <td>21</td>
            <td>12th Grade</td>
        </tr>
    </table>
</body>
</html>
