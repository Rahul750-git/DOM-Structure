<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id Selector Example</title>
    <style>
        #myButton {
            background-color: lightblue;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 10px;
        }
        #myButton:hover {
            background-color: rgb(10, 161, 25);
        }
    </style>
</head>
<body>
    <button id="myButton">Click Me</button>
</body>
</html>
