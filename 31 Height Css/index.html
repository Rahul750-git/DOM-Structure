<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height Example</title>
    <style>
        div{
            height: 200px;
            background-color: lightcoral;
                color: white;
                border: 2px solid darkred;
        }
        p{
            margin: 10px;
            padding: 70px;
            text-align: center;
            border: 2px solid darkred;
            border-style: dotted;
        }
    </style>
</head>
<body>
    <div >
        <p>This div has a height of 200 pixels.</p>
    </div>
</body>
</html>
