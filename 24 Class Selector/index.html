<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector Example</title>
    <style>
        .p{
            color: rgb(141, 18, 20);
            font-size: 18px;
            background-color: lightgray;
            padding: 10px;
            border: 1px solid black;
            text-align: center;
        }
    </style>
</head>
<body>
    <p class="p">This paragraph has a class selector applied.</p>
</body>
</html>
