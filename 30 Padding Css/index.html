<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding Example</title>
    <style>
        div {
            padding: 20px; /* Adds padding inside the div */
            background-color: lightblue; /* Just for visual clarity */
            color: darkgreen;
        }
    </style>
</head>
<body>
    <div>
        <p>This is a paragraph inside a div with padding.</p>
    </div>
</body>
</html>
