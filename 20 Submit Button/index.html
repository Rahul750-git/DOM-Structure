<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Button</title>
    <style>
        button{
            font-size: 16px;
            padding: 10px ;
            margin: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 15px;
        
        }
        button:hover{
            background-color: #293329;
             cursor: pointer;
             transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <button>Submit</button>
</body>
</html>
