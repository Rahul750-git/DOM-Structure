<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marquee Tag</title>
    <style>
        marquee {
            font-size: 24px;
            color: rgb(226, 21, 21);
            background-color: lightgray;
            padding: 10px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <marquee behavior="scroll" direction="left">This text is scrolling from right to left.</marquee>
</body>
</html>
